<!DOCTYPE html>
<html lang="nb-NO">

<head>

  <title>Felleskostnader</title>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/condo.css">

</head>

<body>

  <!-- table container for all tables -->
  <div class="tableContainer">

    <!-- show horizontal menu -->
    <div class="horizontalMenu"></div>

    <!-- show header -->
    <div class="showHeader"></div>

    <!-- edit filter -->
    <div class="editFilter"></div>

    <!-- show common cost per year -->
    <div class="showcommoncostyear"></div>

    <!-- show remote heating -->
    <div class="remoteHeating"></div>

    <!-- show income next year -->
    <div class="incomeNextYear"></div>

    <!-- show bank deposit -->
    <div class="bankDeposit"></div>

    <!-- show message -->
    <div class="message"></div>

  </div>

  <script src="class/condo-class.js"></script>
  <script src="class/condo-user-class.js"></script>
  <script src="class/condo-condominium-class.js"></script>

  <script src="class/condo-annualaccount-class.js"></script>
  <script src="class/condo-condo-class.js"></script>
  <script src="class/condo-bankaccount-class.js"></script>
  <script src="class/condo-commoncost-class.js"></script>
  <script src="scripts/condo-commoncost.js"></script>
</body>

</html>
