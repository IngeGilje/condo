<!DOCTYPE html>
<html>

<head>
  <title>Menu and Table Layout</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Left menu */
    .menu {
      width: 220px;
      background: #2c3e50;
      padding: 10px;
      box-sizing: border-box;
    }

    .menu button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: none;
      background: #34495e;
      color: white;
      cursor: pointer;
      text-align: left;
    }

    .menu button:hover {
      background: #4a6785;
    }

    /* Right side */
    .content {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #f0f0f0;
    }
  </style>

</head>

<body>

  <div class="container">

    <!-- Left menu -->
    <div class="menu">
      <button onclick="showPage('Customers')">Customers</button>
      <button onclick="showPage('Invoices')">Invoices</button>
      <button onclick="showPage('Settings')">Settings</button>
    </div>

    <!-- Right content -->
    <div class="content">
      <h2 id="title">Customers</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>City</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td>1</td>
            <td>John Doe</td>
            <td>London</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Jane Smith</td>
            <td>Paris</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="test3.js"></script>
</body>

</html>
