<!DOCTYPE html>
<html lang="nb-NO">

<head>

  <title>Test 1</title>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/condo.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
    }

    /* Navbar container */
    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    /* Menu list */
    .nav-links {
      list-style: none;
      display: flex;
      gap: 30px;
      padding: 0;
      margin: 0;
    }

    /* Links */
    .nav-links a {
      text-decoration: none;
      color: #e2e8f0;
      font-size: 16px;
      position: relative;
      padding: 5px 0;
      transition: color 0.3s ease;
    }

    /* Hover effect */
    .nav-links a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0;
      left: 0;
      background: #38bdf8;
      transition: width 0.3s ease;
    }

    .nav-links a:hover {
      color: #38bdf8;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* Active link */
    .nav-links a.active {
      color: #38bdf8;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>


</html>
