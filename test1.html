<!DOCTYPE html>
<html lang="nb-NO">

<head>

  <title>Meny test</title>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/condo.css">

</head>

<body>


  <p>&nbsp;</p>
  <div class="row">
    <div class="field" style="width:250px;margin-left: 35px;margin-bottom: 25px;">
      <input type="text" autocomplete="off" class="name one-line" value="Driftskonto" placeholder="Bankkonto navn">
      <label>Navn</label>
    </div>
  </div>
  <div class="field" style="width:250px;margin-left: 35px;margin-bottom: 25px;">
    <input type="text" autocomplete="off" class="bankAccount one-line" value="32062337272" placeholder="Bankkonto navn">
    <label>Bankkontonummer</label>
  </div>
  <div class="field" style="width:250px;margin-left: 35px;margin-bottom: 25px;">
    <input type="text" autocomplete="off" class="openingBalanceDate one-line" value="20200101"
      placeholder="Dato inngående saldo">
    <label>Dato</label>
  </div>
  <div class="field" style="width:250px;margin-left: 35px;margin-bottom: 25px;">
    <input type="text" autocomplete="off" class="openingBalance one-line" value="15188416"
      placeholder="Inngående saldo">
    <label>Inngående saldo</label>
  </div>
  <div class="field" style="width:250px;margin-left: 35px;margin-bottom: 25px;">
    <input type="text" autocomplete="off" class="closingBalanceDate one-line" value="20260414"
      placeholder="Dato inngående saldo">
    <label>Dato</label>
  </div>
  <div class="field" style="width:250px;margin-left: 35px;margin-bottom: 25px;">
    <input type="text" autocomplete="off" class="closingBalance one-line" value="38876093" placeholder="Utgående saldo">
    <label>Utgående saldo</label>
  </div>
  <div class="row">
    <button class="update filter-btn primary" style="width:175px;margin-left: 75px;">
      Oppdater
    </button>
    <button class="cancel filter-btn primary" style="width:175px;margin-left: 75px;">
      Angre
    </button>
  </div>
  <div class="row">
    <button class="delete filter-btn primary" style="width:175px;margin-left: 75px;">
      Slett
    </button>
    <button class="insert filter-btn primary" style="width:175px;margin-left: 75px;">
      Ny
    </button>
  </div>
</body>

</html>
