<!DOCTYPE html>
<html lang="nb-NO">

<head>

  <title>Prosjekt</title>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link rel="stylesheet" href="styles/condo.css"> -->

  <style>
    .mobile-table {
      width: 100%;
      border-collapse: collapse;
    }

    .mobile-table th,
    .mobile-table td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    .mobile-table th {
      background-color: #f2f2f2;
      text-align: left;
    }

    @media screen and (max-width: 600px) {
      .mobile-table thead {
        display: none;
      }

      .mobile-table tr {
        display: block;
        margin-bottom: 10px;
      }

      .mobile-table td {
        display: block;
        text-align: right;
        position: relative;
        padding-left: 50%;
      }

      .mobile-table td::before {
        content: attr(data-label);
        position: absolute;
        left: 0;
        top: 0;
        padding-left: 10px;
        font-weight: bold;
        text-align: left;
      }
    }
  </style>
</head>

<body>

  <table class="mobile-table">
    <thead>
      <tr>
        <th>Navn</th>
        <th>Alder</th>
        <th>By</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td data-label="Navn">Ola Nordmann</td>
        <td data-label="Alder">30</td>
        <td data-label="By">Oslo</td>
      </tr>
      <tr>
        <td data-label="Navn">Kari Nordmann</td>
        <td data-label="Alder">28</td>
        <td data-label="By">Bergen</td>
      </tr>
      <tr>
        <td data-label="Navn">Per Hansen</td>
        <td data-label="Alder">35</td>
        <td data-label="By">Trondheim</td>
      </tr>
    </tbody>
</body>

</html>
